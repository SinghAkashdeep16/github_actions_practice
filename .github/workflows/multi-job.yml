name: multi-job

on:
  push:
    branches:
      - main

jobs:
  main-check:
    runs-on: ubuntu-latest
    outputs:
      my_value: ${{ steps.step1.outputs.date }}

    steps:
      - name: create output
        id: step1
        if: ${{ github.ref_name == 'main' }}
        run: echo "date=$(date)" >> $GITHUB_OUTPUT

      - name: print output in same job
        run: echo "Date is ${{ steps.step1.outputs.date }}"

  usage:
    runs-on: ubuntu-latest
    needs: main-check

    steps:
      - name: print output from previous job
        run: echo "Output from main-check: ${{ needs.main-check.outputs.my_value }}"

  fail-check:
    runs-on: ubuntu-latest

    steps:
      - name: step 1 will fail
        run: exit 1

      - name: run only if previous step failed
        if: ${{ failure() }}
        run: echo "Previous step failed!"

  push-check:
    runs-on: ubuntu-latest

    steps:
      - name: run only on push
        if: ${{ github.event_name == 'push' }}
        run: echo "This runs only on push events"

  continue-error-check:
    runs-on: ubuntu-latest

    steps:
      - name: step that may fail
        continue-on-error: true
        run: exit 1

      - name: next step
        run: echo "Workflow continues"
