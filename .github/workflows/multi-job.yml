name: "multi-job"

on: 
  push:
    branches:
      - main

env:
  APP_NAME: myapp

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: staging

    steps:
      - name: "build stage"
        env:
          VERSION: 1.0.0
        run: |
          echo "App: $APP_NAME"
          echo "Env: $ENVIRONMENT"
          echo "Version: $VERSION"
          echo "COMMIT SHA: ${{ github.sha }}"
          echo "ACTOR: ${{ github.actor }}"
