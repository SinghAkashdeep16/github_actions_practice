---
name: multi-job
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  conditional-demo:
    runs-on: ubuntu-latest
    steps:
      - name: Run only on main branch
        if: ${{ github.ref_name == 'main' }}
        run: echo "This step runs only on the main branch"
      - name: Step that fails
        run: exit 1
      - name: Run only if previous step failed
        if: ${{ failure() }}
        run: echo "Previous step failed"
  push-only-job:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Run only on push
        run: echo "This job runs only for push events"
  continue-error-demo:
    runs-on: ubuntu-latest
    steps:
      - name: Step that may fail
        continue-on-error: true
        run: exit 1
      - name: Next step
        run: echo "Workflow continues even though the previous step failed"
