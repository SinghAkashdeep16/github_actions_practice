
name: "self-hosted-workflows"
on: 
  push:
    branches:
      - main
jobs:
  ubuntu-os:
    runs-on: ubuntu-latest
    steps:
      - name: "check os name"
        run: echo  $RUNNER_OS
      - name: Print hostname
        run:  hostname
      - name:  " The current user running the job "
        run: echo $whoami
  mac-os:
    runs-on: macos-latest
    steps:
      - name: "check os name"
        run:  echo $RUNNER_OS
      - name: Print hostname
        run:  hostname
      - name:  " The current user running the job "
        run: echo $whoami
  windows-os:
    runs-on: macos-latest
    steps:
      - name: "check os name"
        run:  echo $RUNNER_OS
      - name: Print hostname
        run: hostname
      - name:  " The current user running the job "
        run: echo $whoami
  

  

