name: Reusable – Build and Test

on:
  workflow_call:
    inputs:
      python_version:
        required: true
        type: string
      run_tests:
        required: false
        type: boolean
        default: true
    outputs:
      test_result:
        description: "Result of the test run: passed or failed"
        value: ${{ jobs.build.outputs.test_result }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      test_result: ${{ steps.set_outputs.outputs.test_result }}

    # CONTEXT: All run steps execute from inside Task-Manager/ because that
    # is where app.py, requirements.txt, and tests/ all live. Without this
    # default the runner looks at the repo root and finds nothing.
    defaults:
      run:
        working-directory: ./Task-Manager

    steps:
      # NOTE: Checkout runs at repo root (no working-directory override) —
      # it must clone the full repo before any other step runs.
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies
        # CONTEXT: Installs everything in Task-Manager/requirements.txt.
        # pytest is installed explicitly here as a safety net in case it is
        # missing from requirements.txt — "command not found" exit 127 fix.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flask-sqlalchemy

      - name: Run tests
        if: ${{ inputs.run_tests }}
        # CONTEXT: Running pytest from Task-Manager/ (our working-directory).
        # -v gives verbose output so each test name is visible in the Actions log.
        # The sys.path.insert in test_app.py handles the import of app.py from
        # the parent folder so no extra PYTHONPATH setup is needed here.
        run: pytest tests/ -v

      - name: Set output
        # CONTEXT: if: always() ensures this step runs even when pytest fails
        # and exits non-zero. Without this the job exits before setting the
        # output and downstream jobs that read test_result get an empty string.
        id: set_outputs
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "test_result=passed" >> $GITHUB_OUTPUT
          else
            echo "test_result=failed" >> $GITHUB_OUTPUT
          fi
