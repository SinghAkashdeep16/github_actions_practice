name: Ignore Docs Changes

on:
  push:
    branches:
      - main
      - 'release/*'
    paths-ignore:
      - '*.md'
      - 'docs/**'

jobs:
  ignore-docs-job:
    runs-on: ubuntu-latest
    steps:
      - name: Print trigger info
        run: echo "Triggered by ${{ github.event_name }} on ${{ github.ref }}"