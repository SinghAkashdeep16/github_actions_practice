name: "pr checks"

on:
  workflow_dispatch:
jobs:                       
  print_input:                 
    runs-on: ubuntu-latest  
    strategy:
       matrix:
         python-version: [ 3.10, 3.11, 3.12]
    steps:           
      - name: set up python versions
        uses: actions/python-version@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: print python version
        run: python --version
