name: PR CHECKS

on:
    pull_request:
        branches:
            - main
jobs: 
    file-size-check:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Fails if file > 1 mb
              run: |
                find . -size +1M -not -path './.git/*' > large_files.txt
                if [ -s large_files.txt ]; then
                    echo "Files larger than 1MB found:"
                    cat large_files.txt
                    exit 1
                fi
    branch-name-check:
        runs-on: ubuntu-latest
        steps: 
            - name: Read branch name
              run: |
                BRANCH="${{ github.head_ref }}"
                if [[ ! "$BRANCH" =~ ^(feature|fix|docs)/ ]]; then
                    echo "bad branch name"
                    exit 1
                fi            
    pr-body-check:
        runs-on: ubuntu-latest
        steps:
            - name: Pr-body checks
              run: |
                msg="${{ github.event.pull_request.body }}"
                if [ -z "$msg" ]; then
                    echo "Warning"
                fi