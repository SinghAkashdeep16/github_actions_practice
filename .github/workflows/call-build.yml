name: Build Caller

on:
  push:
    branches:
      - main

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml
    with:
      app-name: "my-web-app"
      environment: "production"
    secrets:
      docker_token: ${{ secrets.DOCKER_TOKEN }}
  print_version:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: print build version
        run: echo "Build version is ${{ needs.build.outputs.build-version }}"
    

