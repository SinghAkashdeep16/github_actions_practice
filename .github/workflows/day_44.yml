name: "passing test run in CI"

on:
  push:
    branches:
      - main

jobs:
  job1:
    runs-on: ubuntu-latest

    steps:
      - name: cache
        uses: actions/cache@v4
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x .github/workflows/script.sh

      - name: Run script
        run: ./.github/workflows/script.sh
