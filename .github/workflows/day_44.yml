name: "passing test run in CI"

on:
  push:
    branches:
      - main

jobs:
  print_secret:
    runs-on: ubuntu-latest
    env:
      USERNAME: "${{ secrets.DOCKER_USERNAME }}"
      TOKEN: "${{ secrets.DOCKER_TOKEN }}"
    steps:
      - name: print secret message
        run: |    
          echo "$TOKEN" | docker login -u "$USERNAME" --password-stdin
