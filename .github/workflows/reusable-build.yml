name: reusable workfow
on: 
  workflow_call:
    inputs:
      app_name:
        type: string
        required: true
      environment: 
        type: string
        required: false
        default: staging
    secrets:
       docker_token:
         required: true
    outputs:
      build_version: 
        description: "tHE generated build version string"
        value: ${{ jobs.checkout_code.outputs.build_version }}
jobs:
  checkout_code: 
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.version.outputs.build_version }}
      
    steps:
      - name: generate the version string
        id: version
        run: echo "build_version=v1.0-${{ github.sha }}" >> $GITHUB_OUTPUT
        
      - name: Checkout code
        uses: actions/checkout@v4
      - name: print the app_name for environment
        run: echo "Building ${{ inputs.app_name }} for ${{ inputs.environment }} "
      - name: check docker token
        run: |
          if [ -n "${{ secrets.docker_token }}" ]; then
            echo  "docker token is set:true"
          else
            echo " docker token is set: false"
          fi
          
        
      

