name: "hello-worklow"
on:
  push:
    branches: 
      - main
jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: print hello
        run: echo "Hello from GitHub Actions!"
      - name: print date and time
        run: date
      - name: Branch name
        run: echo ${{ github.ref_name }}
      - name: list files
        run: ls 
        
